name: CI Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - name: Nuke Cache and Base Install
      run: |
        rm -rf node_modules package-lock.json
        npm install --force
    - name: Inject Missing Linux Binaries
      run: npm install @tailwindcss/oxide-linux-x64-gnu lightningcss-linux-x64-gnu --no-save --force
    - run: npm run lint
    - run: npm run build
    - run: npm test -- --coverage
